<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTC RSI Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #131722; color: white; text-align: center; padding: 20px; }
        .container { max-width: 600px; margin: auto; }
        .card { background: #1e222d; padding: 30px; border-radius: 20px; border-top: 6px solid #2962ff; box-shadow: 0 15px 35px rgba(0,0,0,0.5); }
        h1 { color: #d1d4dc; font-size: 1.5em; }
        #price { font-size: 3em; font-weight: bold; color: #00ff00; margin: 15px 0; }
        .info-row { display: flex; justify-content: space-around; margin: 20px 0; border-top: 1px solid #363c4e; padding-top: 20px; }
        .info-item { flex: 1; }
        .label { font-size: 0.8em; color: #848e9c; text-transform: uppercase; }
        .value { font-size: 1.2em; font-weight: bold; color: #ffaa00; }
        #status { font-size: 1.4em; font-weight: bold; margin-top: 20px; padding: 10px; border-radius: 10px; background: #2a2e39; }
        #update { font-size: 0.7em; color: #5d6673; margin-top: 25px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>Bitcoin Signal (1H)</h1>
            <div id="price">...</div>
            
            <div class="info-row">
                <div class="info-item">
                    <div class="label">Indikator RSI</div>
                    <div id="rsi-val" class="value">--</div>
                </div>
            </div>

            <div id="status">Menganalisa...</div>
            <div id="update"></div>
        </div>
        
        <br>
        <div id="tradingview_chart"></div>
    </div>

    <script>
        async function fetchSignal() {
            try {
                const res = await fetch('data.json?t=' + Date.now());
                const data = await res.json();
                
                document.getElementById('price').innerText = "$" + data.price;
                document.getElementById('rsi-val').innerText = data.rsi;
                document.getElementById('status').innerText = data.signal;
                document.getElementById('update').innerText = "Update Terakhir: " + data.last_update;

                // Warna Sinyal
                const statusBox = document.getElementById('status');
                if (data.signal.includes("BUY")) statusBox.style.color = "#00ff00";
                else if (data.signal.includes("SELL")) statusBox.style.color = "#ff4444";
                else statusBox.style.color = "#ffaa00";

            } catch (e) {
                console.log("Menunggu data...");
            }
        }

        setInterval(fetchSignal, 5000);
        fetchSignal();
    </script>
</body>
</html>
