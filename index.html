<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Sinyal RSI</title>
    <style>
        body { font-family: sans-serif; background-color: #131722; color: white; text-align: center; padding: 20px; }
        .container { max-width: 800px; margin: auto; }
        .signal-box { background: #1e222d; padding: 25px; border-radius: 15px; border-top: 5px solid #2962ff; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #price { font-size: 2.5em; font-weight: bold; color: #00ff00; margin: 10px 0; }
        #rsi-val { font-size: 1.2em; color: #ffaa00; margin-bottom: 10px; }
        #status { font-size: 1.5em; font-weight: bold; padding: 10px; border-radius: 8px; background: #2a2e39; display: inline-block; }
        #update { font-size: 0.8em; color: gray; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>BTC Signal Tracker (RSI)</h1>
        
        <div class="signal-box">
            <div id="price">Memuat Harga...</div>
            <div id="rsi-val">RSI: --</div>
            <div id="status">Memindai Sinyal...</div>
            <div id="update"></div>
        </div>

        <div id="tradingview_chart"></div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        // Inisialisasi Chart
        new TradingView.widget({
            "width": "100%", "height": 400, "symbol": "BINANCE:BTCUSDT",
            "interval": "60", "theme": "dark", "container_id": "tradingview_chart"
        });

        // Fungsi Update Data
        async function updateDashboard() {
            try {
                const response = await fetch('data.json?t=' + new Date().getTime());
                const data = await response.json();
                
                document.getElementById('price').innerText = "$" + data.price;
                document.getElementById('rsi-val').innerText = "Indikator RSI: " + data.rsi;
                document.getElementById('status').innerText = "Sinyal: " + data.signal;
                document.getElementById('update').innerText = "Terakhir Update: " + data.last_update;
                
                // Ubah warna harga berdasarkan sinyal
                if(data.signal.includes("BUY")) {
                    document.getElementById('status').style.color = "#00ff00";
                } else if(data.signal.includes("SELL")) {
                    document.getElementById('status').style.color = "#ff4444";
                } else {
                    document.getElementById('status').style.color = "#ffaa00";
                }
            } catch (e) {
                console.log("Menunggu robot memperbarui data.json...");
            }
        }

        setInterval(updateDashboard, 10000);
        updateDashboard();
    </script>
</body>
</html>
