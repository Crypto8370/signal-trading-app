<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Sinyal Trading</title>
    <style>
        body { font-family: sans-serif; background-color: #131722; color: white; text-align: center; padding: 20px; }
        .container { max-width: 800px; margin: auto; }
        .signal-box { background: #1e222d; padding: 20px; border-radius: 12px; border-top: 4px solid #2962ff; margin-bottom: 20px; }
        #price { font-size: 2em; font-weight: bold; color: #00ff00; }
        #status { font-size: 1.5em; margin: 10px 0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Dashboard Sinyal BTC</h1>
        <div class="signal-box">
            <div id="price">Memuat Harga...</div>
            <div id="status">Memindai Sinyal...</div>
            <div id="update" style="font-size: 0.8em; color: gray; margin-top: 10px;"></div>
        </div>
        <div id="tradingview_chart"></div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        // Widget TradingView
        new TradingView.widget({
            "width": "100%", "height": 400, "symbol": "BINANCE:BTCUSDT",
            "interval": "60", "theme": "dark", "container_id": "tradingview_chart"
        });

        // Fungsi mengambil data dari robot (scanner.py -> data.json)
        async function updateDashboard() {
            try {
                const response = await fetch('data.json?t=' + new Date().getTime());
                const data = await response.json();
                
                document.getElementById('price').innerText = "$" + data.price;
                document.getElementById('status').innerHTML = "Sinyal: " + data.signal;
                document.getElementById('update').innerText = "Terakhir Update: " + data.last_update;
            } catch (e) {
                console.log("Menunggu robot mengirim data...");
            }
        }

        // Jalankan update setiap 10 detik
        setInterval(updateDashboard, 10000);
        updateDashboard();
    </script>
</body>
</html>
