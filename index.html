<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signal Trading App</title>
    <style>
        body { font-family: sans-serif; background-color: #131722; color: white; margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: auto; }
        .header { text-align: center; margin-bottom: 20px; }
        .signal-box { background: #1e222d; padding: 15px; border-radius: 8px; border-left: 5px solid #2962ff; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Dashboard Sinyal Trading</h1>
            <p>Analisis Market Real-Time</p>
        </div>

        <div class="signal-box">
            <strong>Status Sinyal:</strong> Memindai Pasar...
        </div>

        <div id="chart-trading"></div>
        <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
        <script type="text/javascript">
            new TradingView.widget({
                "width": "100%",
                "height": 500,
                "symbol": "BINANCE:BTCUSDT",
                "interval": "60",
                "timezone": "Asia/Jakarta",
                "theme": "dark",
                "style": "1",
                "locale": "id",
                "enable_publishing": false,
                "allow_symbol_change": true,
                "container_id": "chart-trading"
            });
        </script>
    </div>
</body>
</html>
